<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Generate Application | RiseRemote</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Generate a smart job application draft with RiseRemote.">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <div class="container">
            <h1>RiseRemote</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="jobs.html">Jobs</a>
                <a href="apply.html">Apply Smart</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h2>Generate Your Application Draft</h2>
            <p>Fill in your details and get a ready-to-use application letter.</p>
        </div>
    </section>

    <section class="features">
        <div class="container">

            <div class="feature">
                <h3>Your Details</h3>

                <form>
                    <p>
                        <label>Full Name:</label><br>
                        <input type="text" placeholder="Enter your full name">
                    </p>

                    <p>
                        <label>Skills:</label><br>
                        <input type="text" placeholder="e.g. HTML, CSS, JavaScript">
                    </p>

                    <p>
                        <label>Why should they hire you?</label><br>
                        <textarea rows="4" placeholder="Write a short reason"></textarea>
                    </p>

                    <p>
                        <button type="button" class="btn-primary">
                            Generate Draft
                        </button>
                    </p>
                </form>

            </div>

            <div class="feature">
                <h3>Generated Application</h3>
                <p>
                    Your application draft will appear here.
                </p>
            </div>

        </div>
    </section>

    <footer>
        <div class="container">
            <p>© 2026 RiseRemote. Built to empower African tech talent.</p>
        </div>
    </footer>

</body>
</html>
